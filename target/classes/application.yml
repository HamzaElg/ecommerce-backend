spring:
  application:
    name: electronics-ecommerce

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ecommerce}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate  # Flyway handles schema; Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  cache:
    type: redis
    redis:
      time-to-live: 300000  # 5 minutes default TTL

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

# JWT configuration
# Design choice: short-lived access tokens (15 min) + longer refresh tokens (7 days)
# This balances security (short exposure window) with UX (no frequent re-login)
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-change-in-production-min-32-chars}
  access-token-expiration: 900000      # 15 minutes in ms
  refresh-token-expiration: 604800000  # 7 days in ms

# Application-level configs
app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}
  reservation:
    timeout-minutes: 30  # Stock reservation timeout before auto-release

# Actuator - expose only safe endpoints; health + info only (no env/beans in prod)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

# SpringDoc / Swagger UI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never  # Never expose internal error messages to clients

logging:
  level:
    com.ecommerce: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
